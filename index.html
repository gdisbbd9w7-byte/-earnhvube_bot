<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1a2a">

<title>EarnEase Download</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg,#0b1a2a,#132c45);
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #132c45;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    margin-bottom: 5px;
}

p {
    font-size: 14px;
    opacity: 0.8;
}

button {
    padding: 14px;
    width: 100%;
    margin-top: 12px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.verify {
    background: orange;
}

.download {
    background: #2ecc71;
    display: none;
}

button:active {
    transform: scale(0.96);
}
</style>
</head>

<body>

<div class="box">
    <h2>EarnEase App</h2>
    <p>Verify to download the latest version</p>

    <button class="verify" onclick="startVerify()">Verify Now</button>
    <button id="downloadBtn" class="download">Download EarnEase</button>
</div>

<script>
function startVerify() {
    let btn = document.querySelector(".verify");
    btn.innerText = "Verifying...";
    btn.disabled = true;

    setTimeout(() => {
        btn.innerText = "Verified ✔";
        document.getElementById("downloadBtn").style.display = "block";
    }, 3000);
}

document.getElementById("downloadBtn").onclick = () => {
    // 👉 এখানে তোমার EarnEase APK link বসাও
    window.location.href = "https://www.mediafire.com/file/lc2jdqvb0v5jf7y/app-apk-69dd472cdc801-1776109356+(1).apk/file";
};
</script>

</body>
</html>
