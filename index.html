<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money App</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

.container {
  max-width: 350px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 { color: #1976d2; }

.stats {
  background: #eee;
  padding: 15px;
  border-radius: 10px;
  margin: 15px 0;
  display: flex;
  justify-content: space-around;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  color: white;
}

.blue { background:#1976d2; }
.green { background:#28a745; }
.red { background:#dc3545; }
</style>
</head>

<body>

<div class="container">
  <h1>Telegram Mini Earning App</h1>
  <p>Developed by <b>EMRAN HOSSAIN</b></p>

  <div class="stats">
    <div>
      <h2 id="ads">0</h2>
      <p>Completed Ads</p>
    </div>
    <div>
      <h2 id="points">0</h2>
      <p>Total Points</p>
    </div>
  </div>

  <button class="btn blue" onclick="rewardAd()">Reward Interstitial</button>
  <button class="btn blue" onclick="popupAd()">Reward Popup</button>
  <button class="btn blue" onclick="inAppAd()">In-App Interstitial</button>

  <button class="btn green" onclick="withdraw()">Withdraw</button>
  <button class="btn red" onclick="reset()">Reset Count</button>
</div>

<script>
// Load data
let ads = parseInt(localStorage.getItem("ads")) || 0;
let points = parseInt(localStorage.getItem("points")) || 0;

updateUI();

function updateUI(){
  document.getElementById("ads").innerText = ads;
  document.getElementById("points").innerText = points;
}

// Save
function save(){
  localStorage.setItem("ads", ads);
  localStorage.setItem("points", points);
  updateUI();
}

// Reward Interstitial → লিঙ্ক ওপেন হবে
function rewardAd(){
  window.open("https://emran4839.blogspot.com/2026/04/alhamdulillah.html", "_blank");
  
  // পয়েন্ট/এড কন্টিনিউ করতে চাইলে আনকমেন্ট করো
  /*
  ads++;
  points += 10;
  save();
  alert("Reward Added!");
  */
}

// Popup → Monetag link
function popupAd(){
  window.open("https://omg10.com/4/10833910", "_blank");

  setTimeout(() => {
    ads++;
    points += 5;
    save();
    alert("Reward Added!");
  }, 3000);
}

// In-App
function inAppAd(){
  ads++;
  points += 3;
  save();
}

// Withdraw → WhatsApp
function withdraw(){
  let msg = `Hello, I want to withdraw.\nPoints: ${points}`;
  let url = "https://wa.me/8801320512829?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

// Reset
function reset(){
  ads = 0;
  points = 0;
  save();
}
</script>

</body>
</html>
